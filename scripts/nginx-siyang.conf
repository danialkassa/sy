# ============================================================
# Nginx Configuration for siyang.tools
# - Serves static website on ports 80/443
# - Serves Decap CMS admin panel at /admin/
# - Proxies Gitea (Docker, port 3000) for OAuth + API + assets
# ============================================================

# Upstream for Gitea Docker container
upstream gitea {
    server 127.0.0.1:3000;
}

# ---- HTTP → HTTPS Redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name siyang.tools www.siyang.tools;
    return 301 https://siyang.tools$request_uri;
}

# ---- Main HTTPS Server ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name siyang.tools www.siyang.tools;

    ssl_certificate /etc/letsencrypt/live/siyang.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siyang.tools/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/siyang/public;
    index index.html;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Deny hidden files (must come before other locations) ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ---- Gitea Login / User routes (proxy first, before /) ----
    # This is the KEY FIX: the OAuth flow needs /user/login, /user/settings, etc.
    location /user/ {
        proxy_pass http://gitea;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ---- Gitea OAuth authorize/callback ----
    location /login/oauth/ {
        proxy_pass http://gitea;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Gitea API ----
    location /api/ {
        proxy_pass http://gitea;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100M;
    }

    # ---- Gitea Assets (local-first, then proxy fallback) ----
    # ^~ gives this prefix location priority over regex locations
    # so static .css/.js requests from Gitea go here, not the cache block below
    location ^~ /assets/ {
        # Try local website asset first, if not found proxy to Gitea
        try_files $uri @gitea_assets;
    }

    location @gitea_assets {
        proxy_pass http://gitea;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Website favicon, robots.txt, sitemap (exact matches, priority) ----
    location = /favicon.ico {
        try_files /favicon.ico =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        expires 1h;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        expires 1h;
    }

    # ---- Decap CMS Admin Panel ----
    location /admin/ {
        alias /var/www/siyang/public/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
        # NOTE: text/yaml MIME type for .yml files is already set in
        # /etc/nginx/mime.types — no nested types block needed here.
    }

    # ---- Cache policy for static assets (no nested locations) ----
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ---- Main website (catch-all for static files) ----
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ---- Health Check ----
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ---- Webhook Listener (for CMS index regeneration) ----
    # Auth is handled by the webhook listener itself (Bearer token or localhost)
    location /webhook/ {
        proxy_pass http://127.0.0.1:3099/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}