# ============================================================
# Nginx Configuration for Ningbo Siyang Public Website
# - Serves static website on port 80 at /
# - Proxies Gitea on port 3000 at /git/ (or subdomain)
# - Serves Decap CMS admin panel at /admin/
# ============================================================

# Upstream for Gitea
upstream gitea {
    server 127.0.0.1:3000;
}

server {
    server_name siyang.tools 165.22.250.66;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Website Root (static files) ----
    root /var/www/siyang/public;
    index index.html;

    # ---- Main website ----
    location / {
        try_files $uri $uri/ $uri.html =404;

        # Cache static assets aggressively
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Cache JSON data files less aggressively
        location ~* \.json$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
            try_files $uri =404;
        }

        # No cache for HTML (so CMS updates appear quickly)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri =404;
        }
    }

    # ---- Gitea Reverse Proxy ----
    location /git/ {
        rewrite ^/git/(.*) /$1 break;
        proxy_pass http://gitea;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 100M;
    }

    # Gitea OAuth callback (must be accessible at root level)
    location /login/oauth/ {
        proxy_pass http://gitea;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gitea API
    location /api/ {
        proxy_pass http://gitea;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gitea assets
    location /assets/ {
        # First try serving from website, then proxy to Gitea
        try_files $uri @gitea_assets;
    }

    location @gitea_assets {
        proxy_pass http://gitea;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Gitea user login, OAuth, and avatar
    location /user/ {
        proxy_pass http://gitea;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Decap CMS Admin Panel ----
    location /admin/ {
        alias /var/www/siyang/public/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;

        # Serve config.yml with correct YAML MIME type (critical for Decap CMS)
        location = /admin/config.yml {
            alias /var/www/siyang/public/admin/config.yml;
            default_type text/yaml;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # No cache for admin HTML (so CMS updates appear immediately)
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # ---- Health Check ----
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ---- Deny hidden files ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/siyang.tools-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/siyang.tools-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = siyang.tools) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name siyang.tools 165.22.250.66;
    return 404; # managed by Certbot


}
