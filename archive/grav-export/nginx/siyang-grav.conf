# Nginx configuration for Ningbo Siyang — Grav CMS
# Replaces the old static site + Gitea + webhook architecture
# Place at: /etc/nginx/sites-available/siyang

server {
    listen 80;
    server_name siyang.tools www.siyang.tools;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name siyang.tools www.siyang.tools;

    # ========== SSL ==========
    ssl_certificate /etc/letsencrypt/live/siyang.tools/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siyang.tools/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!RC4;

    # ========== ROOT ==========
    root /var/www/siyang/public;
    index index.php index.html;

    # ========== GRAV: Main routing ==========
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ========== GRAV: Admin panel ==========
    location /admin {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }

    # ========== PHP-FPM ==========
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=256M \n post_max_size=256M \n max_execution_time=300";
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # ========== Static assets — aggressive caching ==========
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ========== Security: Deny access to sensitive files ==========
    location ~ /(\.git|\.htaccess|composer\.(json|lock)|vendor|README\.md|CHANGELOG\.md|LICENSE) {
        deny all;
        return 404;
    }

    location ~ ^/user/(data|config|accounts)/ {
        deny all;
        return 404;
    }

    location ~ ^/(backup|tmp|logs|\.github)/ {
        deny all;
        return 404;
    }

    # ========== Gzip ==========
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml image/svg+xml;

    # ========== Security headers ==========
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ========== Logging ==========
    access_log /var/log/nginx/siyang-access.log;
    error_log /var/log/nginx/siyang-error.log;
}
