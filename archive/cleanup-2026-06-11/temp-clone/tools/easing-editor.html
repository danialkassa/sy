<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Easing Editor — Preview cubic-bezier</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;margin:24px;color:#111}
    .row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
    label{min-width:90px}
    input[type=range]{width:220px}
    .preview{height:120px;border:1px solid #e6e6e6;padding:16px;display:flex;align-items:center}
    .track{width:100%;height:40px;background:#f3f3f3;border-radius:6px;position:relative;overflow:hidden}
    .ball{width:28px;height:28px;background:#2563eb;border-radius:50%;position:absolute;left:8px;top:6px}
    .code{background:#111;color:#fff;padding:8px;border-radius:6px;font-family:monospace;font-size:14px}
    .presets select{width:240px}
    button{padding:8px 10px;border-radius:6px;border:1px solid #ccc;background:#fff;cursor:pointer}
  </style>
</head>
<body>
  <h2>Easing Editor</h2>
  <p>Adjust cubic-bezier control points or pick a preset. Preview updates live.</p>

  <div class="row presets">
    <label>Preset</label>
    <select id="preset">
      <option value="linear">linear</option>
      <option value="ease">ease</option>
      <option value="ease-in">ease-in</option>
      <option value="ease-out">ease-out</option>
      <option value="ease-in-out">ease-in-out</option>
      <option value="custom">custom (cubic-bezier)</option>
    </select>
    <button id="copy">Copy timing-function</button>
  </div>

  <div class="row">
    <label>P1 X</label><input id="p1x" type="range" min="0" max="1" step="0.01" value="0.25">
    <label>P1 Y</label><input id="p1y" type="range" min="0" max="1" step="0.01" value="0.1">
  </div>
  <div class="row">
    <label>P2 X</label><input id="p2x" type="range" min="0" max="1" step="0.01" value="0.25">
    <label>P2 Y</label><input id="p2y" type="range" min="0" max="1" step="0.01" value="0.9">
  </div>

  <div class="row">
    <label>Duration</label><input id="duration" type="range" min="100" max="5000" step="50" value="800">
    <span id="durationVal">800ms</span>
  </div>

  <div class="preview">
    <div style="flex:1">
      <div class="track" id="track">
        <div class="ball" id="ball"></div>
      </div>
    </div>
    <div style="margin-left:12px">
      <div class="code" id="csscode">transition: transform 0.8s cubic-bezier(0.25,0.1,0.25,0.9);</div>
    </div>
  </div>

  <script>
    const p1x = document.getElementById('p1x'), p1y = document.getElementById('p1y'), p2x = document.getElementById('p2x'), p2y = document.getElementById('p2y');
    const duration = document.getElementById('duration'), durationVal = document.getElementById('durationVal');
    const ball = document.getElementById('ball'), track = document.getElementById('track');
    const csscode = document.getElementById('csscode');
    const preset = document.getElementById('preset');
    const copyBtn = document.getElementById('copy');

    const presets = {
      'linear': 'linear',
      'ease': 'cubic-bezier(0.25, 0.1, 0.25, 1.0)',
      'ease-in': 'cubic-bezier(0.42, 0, 1.0, 1.0)',
      'ease-out': 'cubic-bezier(0, 0, 0.58, 1.0)',
      'ease-in-out': 'cubic-bezier(0.42, 0, 0.58, 1.0)'
    };

    function updateCode() {
      const dx1 = parseFloat(p1x.value), dy1 = parseFloat(p1y.value), dx2 = parseFloat(p2x.value), dy2 = parseFloat(p2y.value);
      const dur = parseInt(duration.value,10);
      const fn = `cubic-bezier(${dx1}, ${dy1}, ${dx2}, ${dy2})`;
      csscode.textContent = `transition: transform ${dur}ms ${fn};`;
      startPreview(fn, dur);
    }

    let animTimer = null;
    function startPreview(fn, dur) {
      if (animTimer) clearInterval(animTimer);
      // reset
      ball.style.transition = 'none';
      ball.style.transform = 'translateX(0px)';
      // force layout
      void ball.offsetWidth;
      // apply transition
      ball.style.transition = `transform ${dur}ms ${fn}`;
      // animate back-and-forth every duration*2
      let dir = 1;
      function step(){
        const max = track.clientWidth - ball.clientWidth - 16; // padding
        ball.style.transform = `translateX(${dir>0?max:0}px)`;
        dir = -dir;
      }
      step();
      animTimer = setInterval(step, dur+50);
    }

    [p1x,p1y,p2x,p2y,duration].forEach(el => el.addEventListener('input', ()=>{ preset.value='custom'; updateCode(); }));

    preset.addEventListener('change', ()=>{
      const v = preset.value;
      if (v==='custom') return;
      const val = presets[v];
      if (val === 'linear') {
        // disable sliders
        p1x.value = 0; p1y.value = 0; p2x.value = 1; p2y.value = 1;
      } else {
        const nums = val.match(/([-0-9.]+)/g).map(Number);
        p1x.value = nums[0]; p1y.value = nums[1]; p2x.value = nums[2]; p2y.value = nums[3];
      }
      updateCode();
    });

    copyBtn.addEventListener('click', ()=>{
      const text = csscode.textContent;
      navigator.clipboard.writeText(text).then(()=>{ copyBtn.textContent='Copied'; setTimeout(()=>copyBtn.textContent='Copy timing-function',1000); }).catch(()=>{});
    });

    duration.addEventListener('input', ()=>{ durationVal.textContent = duration.value + 'ms'; updateCode(); });

    // init
    updateCode();

    // handle resize
    window.addEventListener('resize', ()=>{ updateCode(); });
  </script>
</body>
</html>
