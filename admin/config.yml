  - name: "settings"
    label: "Site Settings"
    delete: false
    description: "Configure global site settings: navigation menu, footer content, and social links."
    files:
      - label: "Navigation Menu"
        name: "navigation"
        file: "content/settings/navigation.md"
        fields:
          - label: "Product Categories"
            name: "categories"
            widget: "list"
            hint: "The product categories shown in the website navigation dropdown menu. Add, remove, or reorder."
            fields:
              - label: "Category Name"
                name: "name"
                widget: "string"
                hint: "The display name. Example: Drills & Drivers"
              - label: "URL Slug"
                name: "slug"
                widget: "string"
                hint: "Used for the website link. Lowercase with hyphens. Example: drills-drivers"
              - label: "Description"
                name: "description"
                widget: "string"
                hint: "A short description shown in the dropdown menu. Example: Cordless & corded drills"
          - label: "Main Navigation Links"
            name: "mainLinks"
            widget: "list"
            hint: "The main navigation links shown in the header. These appear on every page."
            fields:
              - label: "Link Label"
                name: "label"
                widget: "string"
                hint: "The text shown in the menu. Example: Products, About, Contact"
              - label: "Link URL"
                name: "href"
                widget: "string"
                hint: "Where the link goes. Use relative paths like /products or /contact"
      - label: "Footer"
        name: "footer"
        file: "content/settings/footer.md"
        fields:
          - label: "Copyright Text"
            name: "copyright"
            widget: "string"
            default: "\u00a9 2025 Ningbo Siyang Power Tools Co., Ltd."
            hint: "The copyright notice shown at the bottom of every page."
          - label: "Trust Badge 1"
            name: "badge1"
            widget: "string"
            default: "2-Year Warranty"
            hint: "First trust badge shown in the footer."
          - label: "Trust Badge 2"
            name: "badge2"
            widget: "string"
            default: "ISO 9001 Certified"
          - label: "Trust Badge 3"
            name: "badge3"
            widget: "string"
            default: "SGS Verified"
          - label: "Trust Badge 4"
            name: "badge4"
            widget: "string"
            default: "CE Certified"
          - label: "Footer Link Columns"
            name: "columns"
            widget: "list"
            hint: "The columns of links shown in the footer. Each column has a title and list of links."
            fields:
              - label: "Column Title"
                name: "title"
                widget: "string"
                hint: "The column heading. Example: Products, Company, Support"
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - label: "Link Label"
                    name: "label"
                    widget: "string"
                    hint: "The text shown for the link."
                  - label: "Link URL"
                    name: "href"
                    widget: "string"
                    hint: "Where the link goes. Use relative paths like /contact"
          - label: "Social Media Links"
            name: "socialLinks"
            widget: "list"
            hint: "Social media links shown in the footer."
            required: false
            fields:
              - label: "Platform"
                name: "platform"
                widget: "select"
                options: ["LinkedIn", "YouTube", "Facebook", "Twitter", "Instagram", "WeChat"]
                hint: "Which social media platform?"
              - label: "Profile URL"
                name: "href"
                widget: "string"
                pattern: ['^https?://.+', 'Please enter a valid URL starting with http:// or https://']
                hint: "Full URL to the social media profile."
