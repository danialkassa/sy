backend:
  name: gitea
  repo: admin/b2b
  branch: main
  api_root: https://siyang.tools/api/v1
  base_url: https://siyang.tools
  auth_endpoint: /login/oauth/authorize
  site_domain: siyang.tools
  app_id: b44bfe8b-1633-41ee-9533-738e78b392a0
  squash_merges: true
  commit_messages:
    create: "Add {{collection}}: {{slug}}"
    update: "Update {{collection}}: {{slug}}"
    delete: "Remove {{collection}}: {{slug}}"
    uploadMedia: "Upload image: {{path}}"
    deleteMedia: "Remove image: {{path}}"

publish_mode: editorial_workflow

logo_url: /sy-logo-dark.svg
site_url: https://siyang.tools
display_url: https://siyang.tools
show_preview_links: true
search: true
locale: "en"

slug:
  encoding: "unicode"
  clean_accents: true
  sanitize_replacement: "-"

media_folder: "images/uploads"
public_folder: "/images/uploads"

media_library:
  name: ''
  max_file_size: 5120000
  choose_url: false

collections:
  # ============================================================
  # 0. EDITOR'S GUIDE (Welcome)
  # ============================================================
  - name: "welcome"
    label: "Editor's Guide"
    folder: "admin"
    create: false
    delete: false
    identifier_field: title
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Content"
        name: "body"
        widget: "markdown"
    files:
      - label: "Editor's Guide"
        name: "welcome"
        file: "admin/welcome.md"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"
          - label: "Guide Content"
            name: "body"
            widget: "markdown"

  # ============================================================
  # 1. PRODUCTS
  # ============================================================
  - name: "products"
    label: "Products (Full Details)"
    label_singular: "Product"
    folder: "content/products"
    create: true
    delete: false
    slug: "{{sku}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{sku}} · {{category}}"
    description: "Manage your complete product catalog."
    identifier_field: "name"
    sortable_fields: ["name", "sku", "category", "brand"]
    view_filters:
      - label: "Active Items"
        field: "archived"
        pattern: false
      - label: "Archived Items"
        field: "archived"
        pattern: true
      - label: "In Stock"
        field: "inStock"
        pattern: true
      - label: "Out of Stock"
        field: "inStock"
        pattern: false
      - label: "Featured"
        field: "featured"
        pattern: true
      - label: "Drills & Drivers"
        field: "category"
        pattern: "drills-drivers"
      - label: "Saws"
        field: "category"
        pattern: "saws"
      - label: "Grinders"
        field: "category"
        pattern: "grinders"
      - label: "Sanders"
        field: "category"
        pattern: "sanders"
      - label: "Impact Tools"
        field: "category"
        pattern: "impact-tools"
      - label: "Combo Kits"
        field: "category"
        pattern: "combo-kits"
    view_groups:
      - label: "By Category"
        field: "category"
      - label: "By Brand"
        field: "brand"
      - label: "By Stock Status"
        field: "inStock"
    fields:
      - label: "Product Name"
        name: "name"
        widget: "string"
        required: true
        hint: "=== BASIC INFO === Full product name as shown on the website. Example: 20V Brushless Drill Driver"
      - label: "Product Code (SKU)"
        name: "sku"
        widget: "string"
        required: true
        hint: "Unique identifier for this product. Format: SY-TT-VV-XXX (e.g., SY-DD-20V-BL). This becomes the filename — no spaces allowed."
      - label: "Category"
        name: "category"
        widget: "select"
        required: true
        options:
          - label: "Drills & Drivers"
            value: "drills-drivers"
          - label: "Saws"
            value: "saws"
          - label: "Grinders"
            value: "grinders"
          - label: "Sanders"
            value: "sanders"
          - label: "Impact Tools"
            value: "impact-tools"
          - label: "Combo Kits"
            value: "combo-kits"
        hint: "URL-slug format. Determines URL and display label."
      - label: "Brand"
        name: "brand"
        widget: "select"
        options: ["Ningbo Siyang", "Ningbo Siyang Pro", "Ningbo Siyang Industrial", "Siyang Trade"]
        default: "Ningbo Siyang"
        hint: "Which brand line does this product belong to? This affects the logo shown on the product page."
      - label: "Description"
        name: "description"
        widget: "text"
        required: true
        hint: "=== DESCRIPTION === 2-3 sentence description highlighting key features and applications. This appears on the product page and in search results."
      - label: "Tagline"
        name: "tagline"
        widget: "string"
        required: false
        hint: "Short one-liner for product cards. Falls back to description if empty. Example: Power Meets Precision"
      - label: "User Benefits"
        name: "userBenefits"
        widget: "list"
        fields:
          - {label: "Benefit", name: "benefit", widget: "string", hint: "One bullet point shown on product cards. Example: Brushless motor for longer runtime"}
        required: false
        hint: "3-5 bullet points shown on product cards. These help buyers quickly understand key advantages."
      # ---- Pricing & Trade ----
      - label: "Price (USD)"
        name: "price"
        widget: "number"
        value_type: "int"
        default: 0
        required: false
        hint: "=== PRICING === Unit price in USD. Enter 0 if price varies — the website will show 'Contact for Quote' instead."
      - label: "Compare At Price (USD)"
        name: "compareAtPrice"
        widget: "number"
        value_type: "int"
        default: 0
        required: false
        hint: "Original/reference price for showing a discount. Enter 0 to hide the comparison. Example: If you sell at $89 and want to show was $120, enter 120 here."
      - label: "Category Label"
        name: "categoryLabel"
        widget: "string"
        required: false
        hint: "Display label for the category shown on the product page. Example: 'Combo Kits', 'Drills & Drivers'. Leave blank to use the category name automatically."
      # ---- Images ----
      # NOTE: Existing products reference /images/istock/ for stock placeholders.
      # New product photos uploaded via CMS go to /images/products/.
      # Both paths are valid — migrate istock images to /images/products/ when real photos are available.
      - label: "Main Product Photo"
        name: "image"
        widget: "image"
        required: true
        media_folder: "/images/products"
        public_folder: "/images/products"
        choose_url: false
        hint: "=== IMAGES & MEDIA === Primary product photo. Use 800x800px minimum with a white or neutral background. This is the main image buyers see."
      - {label: "3D Viewer Scene URL", name: "splineSceneUrl", widget: "string", required: false, hint: "Link to a Spline 3D scene for the interactive viewer. Leave blank if no 3D model is available."}
      - {label: "AR Model URL (USDZ/GLB)", name: "arModelUrl", widget: "string", required: false, hint: "Link to a USDZ or GLB file for AR Quick Look on mobile devices. Leave blank if not available."}
      - {label: "3D Viewer Auto-Spin", name: "autoSpin", widget: "boolean", default: true, required: false, hint: "Automatically rotate the 3D model when the page loads. Turn off for static display."}
      - label: "Additional Images"
        name: "images"
        widget: "list"
        fields:
          - {label: "Image", name: "img", widget: "image", media_folder: "/images/products", public_folder: "/images/products", choose_url: false}
        required: false
        hint: "Add 2-4 photos from different angles (side, top, in-use). These appear in the product gallery."
      # ---- Specifications ----
      - label: "Specifications"
        name: "specs"
        widget: "object"
        required: false
        collapsed: true
        hint: "=== SPECIFICATIONS === Technical specs for this product. Only fill in the fields that apply — leave irrelevant ones blank."
        fields:
          - {label: "Voltage", name: "voltage", widget: "string", required: false, hint: "e.g., 20V MAX, 220V-240V"}
          - {label: "Motor Type", name: "motorType", widget: "select", required: false, options: ["", "Brushless", "Brushed", "Universal"], hint: "Brushless is more efficient and durable."}
          - {label: "Max Torque", name: "maxTorque", widget: "string", required: false, hint: "e.g., 530 in-lbs (60 Nm)"}
          - {label: "No-Load Speed (Low)", name: "noLoadSpeedLow", widget: "string", required: false, hint: "e.g., 0-450 RPM"}
          - {label: "No-Load Speed (High)", name: "noLoadSpeedHigh", widget: "string", required: false, hint: "e.g., 0-1500 RPM"}
          - {label: "No-Load Speed (RPM)", name: "noLoadSpeed", widget: "string", required: false, hint: "Single speed. e.g., 11,000 RPM"}
          - {label: "Chuck Size", name: "chuckSize", widget: "string", required: false, hint: 'e.g., 1/2" (13mm) keyless'}
          - {label: "Clutch Settings", name: "clutchSettings", widget: "string", required: false, hint: "e.g., 16+1, 20+1"}
          - {label: "Weight (Tool Only)", name: "weightToolOnly", widget: "string", required: false, hint: "e.g., 3.5 lbs (1.6 kg)"}
          - {label: "Weight (With Battery)", name: "weightWithBattery", widget: "string", required: false, hint: "e.g., 4.2 lbs (1.9 kg)"}
          - {label: "Overall Length", name: "overallLength", widget: "string", required: false, hint: 'e.g., 7-5/8" (194mm)'}
          - {label: "Sound Power Level", name: "soundPower", widget: "string", required: false, hint: "e.g., 95 dB(A)"}
          - {label: "Vibration Level", name: "vibrationLevel", widget: "string", required: false, hint: "e.g., 2.5 m/s²"}
          - {label: "Battery Platform", name: "batteryPlatform", widget: "string", required: false, hint: "e.g., Siyang 20V MAX"}
          - {label: "LED Work Light", name: "ledWorkLight", widget: "string", required: false, hint: "e.g., Yes, with 20-second delay"}
          - {label: "Belt Hook", name: "beltHook", widget: "string", required: false, hint: "e.g., Yes, adjustable"}
          - {label: "Cord Length", name: "cordLength", widget: "string", required: false, hint: "Corded tools. e.g., 6.5 ft (2m)"}
          - {label: "Disc/Blade Diameter", name: "discBladeDiameter", widget: "string", required: false, hint: 'Saws/grinders. e.g., 7-1/4"'}
          - {label: "Arbor Size", name: "arborSize", widget: "string", required: false, hint: 'Saws/grinders. e.g., 5/8"'}
          - {label: "Max Cutting Depth at 90°", name: "maxCuttingDepth", widget: "string", required: false, hint: 'Saws. e.g., 2-1/2" at 90°'}
          - {label: "Pad Size", name: "padSize", widget: "string", required: false, hint: 'Sanders. e.g., 5" random orbit'}
          - {label: "Impacts Per Minute", name: "ipm", widget: "string", required: false, hint: "Impact tools. e.g., 0-3400 IPM"}
          - {label: "Spindle Thread", name: "spindleThread", widget: "string", required: false, hint: "Grinders. e.g., M14 x 2.0"}
          - {label: "Switch Type", name: "switchType", widget: "string", required: false, hint: "e.g., Variable speed trigger, Paddle switch"}
          - {label: "Auxiliary Handle", name: "auxHandle", widget: "string", required: false, hint: "e.g., Yes, 2-position"}
      # ---- Compliance ----
      - label: "Compliance"
        name: "compliance"
        widget: "string"
        default: "CE, ROHS, EEC"
        hint: "=== COMPLIANCE & CERTIFICATIONS === Comma-separated list of certifications this product holds. Example: CE, ROHS, GS, EEC"
      # ---- Trade Details ----
      - label: "Related Products"
        name: "relatedProducts"
        widget: "relation"
        collection: "products"
        value_field: "sku"
        search_fields: ["name", "sku"]
        display_fields: ["name", "sku"]
        multiple: true
        required: false
        hint: "=== RELATED PRODUCTS === Select 2-3 similar or complementary products to show as cross-sell suggestions on this product's page."
      - label: "Downloads"
        name: "downloads"
        widget: "object"
        required: false
        collapsed: true
        hint: "=== DOWNLOADS === Upload product documentation that buyers can download, such as spec sheets and user manuals."
        fields:
          - {label: "Spec Sheet PDF", name: "specSheet", widget: "file", media_folder: "/assets/downloads", public_folder: "/assets/downloads", choose_url: false, required: false}
          - {label: "Manual PDF", name: "manual", widget: "file", media_folder: "/assets/downloads", public_folder: "/assets/downloads", choose_url: false, required: false}
      - label: "Minimum Order Quantity"
        name: "moq"
        widget: "string"
        default: "500 units"
        hint: "=== TRADE DETAILS === Smallest number of units a buyer can order. Example: 500 units"
      - label: "Lead Time"
        name: "leadTime"
        widget: "string"
        default: "30-45 days"
        hint: "How long production takes after order confirmation. Example: 30-45 days"
      - label: "In Stock?"
        name: "inStock"
        widget: "boolean"
        default: true
        hint: "Toggle to show an 'In Stock' or 'Out of Stock' badge on the product page."
      - label: "Stock Quantity"
        name: "stock"
        widget: "number"
        value_type: "int"
        default: 0
        required: false
        hint: "Current inventory count. Enter 0 if you want buyers to contact you for availability."
      - label: "Rating (1-5)"
        name: "rating"
        widget: "number"
        value_type: "int"
        min: 1
        max: 5
        default: 4
        required: false
        hint: "=== MARKETING & DISPLAY === Average customer rating from 1 to 5 stars. Default is 4."
      - label: "Review Count"
        name: "reviewCount"
        widget: "number"
        value_type: "int"
        default: 0
        required: false
        hint: "Total number of customer reviews displayed. Enter 0 to hide reviews."
      - label: "Featured Product?"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Show this product in the 'Featured Tools' section on the homepage."
      - label: "Is Featured (alias)"
        name: "isFeatured"
        widget: "boolean"
        default: false
        required: false
        hint: "Internal system flag. Keep this in sync with 'Featured Product?' above."
      - label: "Is Top Product?"
        name: "isTopProduct"
        widget: "boolean"
        default: false
        required: false
        hint: "Show this product in the 'Top Products' section on the homepage."
      - label: "Warranty"
        name: "warranty"
        widget: "string"
        default: "1 year standard, 2 year brushless motor"
        hint: "=== WARRANTY & LOGISTICS === Warranty terms for this product. Example: 1 year standard, 2 year brushless motor"
      - label: "Warehouse Location"
        name: "warehouseLocation"
        widget: "string"
        required: false
        hint: "Internal use only — not shown on the website. Used for inventory tracking."
      - label: "Compare Fields"
        name: "compareFields"
        widget: "object"
        required: false
        collapsed: true
        hint: "=== COMPARE FIELDS === Values shown when buyers compare products side-by-side. Leave a field blank to hide that row for this product."
        fields:
          - {label: "Power (W)", name: "power", widget: "string", required: false, hint: "e.g., 800W, 1200W"}
          - {label: "Voltage", name: "voltage", widget: "string", required: false, hint: "e.g., 20V MAX, 220V"}
          - {label: "RPM", name: "noLoadSpeed", widget: "string", required: false, hint: "e.g., 0-1500 RPM, 11000 RPM"}
          - {label: "Disc / Blade Size", name: "discSize", widget: "string", required: false, hint: 'e.g., 7-1/4", 5"'}
          - {label: "Weight", name: "weightToolOnly", widget: "string", required: false, hint: "e.g., 3.5 lbs (1.6 kg)"}
          - {label: "Price Range", name: "priceRange", widget: "string", required: false, hint: "e.g., $45-$65 USD"}
          - {label: "Certifications", name: "certifications", widget: "string", required: false, hint: "e.g., CE, RoHS, ISO 9001"}
          - {label: "MOQ", name: "moq", widget: "string", required: false, hint: "e.g., 50 units"}

      - label: "Archive This Item"
        name: "archived"
        widget: "boolean"
        default: false
        hint: "Check this to hide this item from the live website. The item is NOT deleted — it can be unarchived later."
  # ============================================================
  # 1b. PRODUCTS — QUICK EDIT
  # ============================================================
  - name: "products_quick"
    label: "Products (Quick Edit)"
    label_singular: "Product"
    folder: "content/products"
    create: true
    delete: false
    slug: "{{sku}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{sku}} · {{category}}"
    description: "Quick editing view for essential product info. ⚠️ For full specs, compliance, downloads, and advanced fields, use 'Products (Full Details)'."
    identifier_field: "name"
    sortable_fields: ["name", "sku", "category", "brand"]
    view_filters:
      - label: "Active Items"
        field: "archived"
        pattern: false
      - label: "Archived Items"
        field: "archived"
        pattern: true
      - label: "In Stock"
        field: "inStock"
        pattern: true
      - label: "Out of Stock"
        field: "inStock"
        pattern: false
      - label: "Featured"
        field: "featured"
        pattern: true
      - label: "Drills & Drivers"
        field: "category"
        pattern: "drills-drivers"
      - label: "Saws"
        field: "category"
        pattern: "saws"
      - label: "Grinders"
        field: "category"
        pattern: "grinders"
      - label: "Sanders"
        field: "category"
        pattern: "sanders"
      - label: "Impact Tools"
        field: "category"
        pattern: "impact-tools"
      - label: "Combo Kits"
        field: "category"
        pattern: "combo-kits"
    view_groups:
      - label: "By Category"
        field: "category"
      - label: "By Brand"
        field: "brand"
      - label: "By Stock Status"
        field: "inStock"
    fields:
      - label: "Product Name"
        name: "name"
        widget: "string"
        required: true
        hint: "This is a QUICK EDIT form with only basic fields. After saving, switch to 'Products (Full Details)' to add specifications, compliance, trade details, and more. A product with only these 8 fields will have an INCOMPLETE page on the live site."
      - label: "SKU"
        name: "sku"
        widget: "string"
        required: true
        hint: "Unique identifier. Format: SY-TT-VV-XXX. No spaces."
      - label: "Category"
        name: "category"
        widget: "select"
        required: true
        options:
          - label: "Drills & Drivers"
            value: "drills-drivers"
          - label: "Saws"
            value: "saws"
          - label: "Grinders"
            value: "grinders"
          - label: "Sanders"
            value: "sanders"
          - label: "Impact Tools"
            value: "impact-tools"
          - label: "Combo Kits"
            value: "combo-kits"
      - label: "Price (USD)"
        name: "price"
        widget: "number"
        value_type: "int"
        default: 0
        required: false
        hint: "Enter 0 to show 'Contact for Quote'."
      - label: "Main Photo"
        name: "image"
        widget: "image"
        required: true
        media_folder: "/images/products"
        public_folder: "/images/products"
        choose_url: false
      - label: "Description"
        name: "description"
        widget: "text"
        required: true
      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
      - label: "In Stock"
        name: "inStock"
        widget: "boolean"
        default: true

      - label: "Archive This Item"
        name: "archived"
        widget: "boolean"
        default: false
        hint: "Check this to hide this item from the live website. The item is NOT deleted — it can be unarchived later."
      - label: "Completion Status"
        name: "completionStatus"
        widget: "string"
        default: "Incomplete — add specs, compliance, and trade details in Full Details"
        hint: "This product page is incomplete. Go to 'Products (Full Details)' to fill in specifications, compliance, trade details, and downloads."
  # ============================================================
  # 2. BLOG POSTS
  # ============================================================
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{category}} · {{author}}"
    description: "Write and manage blog posts."
    sortable_fields: ["title", "date", "category"]
    view_filters:
      - label: "Active Items"
        field: "archived"
        pattern: false
      - label: "Archived Items"
        field: "archived"
        pattern: true
      - label: "B2B Insights"
        field: "category"
        pattern: "B2B Insights"
      - label: "Industry Trends"
        field: "category"
        pattern: "Industry Trends"
      - label: "Product Spotlight"
        field: "category"
        pattern: "Product Spotlight"
      - label: "Company News"
        field: "category"
        pattern: "Company News"
      - label: "Technical Guides"
        field: "category"
        pattern: "Technical Guides"
      - label: "Featured Posts"
        field: "featured"
        pattern: true
    view_groups:
      - label: "By Category"
        field: "category"
      - label: "By Author"
        field: "author"
    fields:
      - label: "Post Title"
        name: "title"
        widget: "string"
        hint: "Clear headline with keywords for SEO."
      - label: "URL Slug"
        name: "slug"
        widget: "string"
        hint: "Lowercase with hyphens. e.g., choosing-the-right-power-drill"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
      - label: "Author Name"
        name: "author"
        widget: "string"
        default: "Ningbo Siyang Team"
      - label: "Author Role"
        name: "authorRole"
        widget: "string"
        default: "Content Team"
        required: false
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["B2B Insights", "Industry Trends", "Product Spotlight", "Company News", "Technical Guides"]
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "3-5 lowercase tags for SEO and filtering."
      - label: "Cover Image"
        name: "image"
        widget: "image"
        media_folder: "/images/blog"
        public_folder: "/images/blog"
        choose_url: false
        required: false
        hint: "1200x630px recommended."
      - label: "Short Summary"
        name: "excerpt"
        widget: "text"
        hint: "1-2 sentence preview for blog listing."
      - label: "Reading Time (minutes)"
        name: "readTime"
        widget: "number"
        default: 5
        min: 1
        max: 60
      - label: "Featured Post?"
        name: "featured"
        widget: "boolean"
        default: false
      - label: "Full Article"
        name: "body"
        widget: "markdown"

      - label: "Archive This Item"
        name: "archived"
        widget: "boolean"
        default: false
        hint: "Check this to hide this item from the live website. The item is NOT deleted — it can be unarchived later."
  # ============================================================
  # 3. TESTIMONIALS
  # ============================================================
  - name: "testimonials"
    label: "Testimonials"
    label_singular: "Testimonial"
    folder: "content/testimonials"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{company}} · {{country}}"
    description: "Customer testimonials and reviews."
    sortable_fields: ["name", "company", "order"]
    view_filters:
      - label: "Active Items"
        field: "archived"
        pattern: false
      - label: "Archived Items"
        field: "archived"
        pattern: true
    fields:
      - label: "Customer Name"
        name: "name"
        widget: "string"
      - label: "Job Title"
        name: "position"
        widget: "string"
        required: false
        hint: "e.g., Procurement Manager"
      - label: "Company Name"
        name: "company"
        widget: "string"
      - label: "Country"
        name: "country"
        widget: "select"
        options: ["", "Germany", "UAE", "Brazil", "USA", "UK", "France", "Australia", "Japan", "South Korea", "India", "Saudi Arabia", "South Africa", "Mexico", "Indonesia", "Thailand", "Vietnam", "Turkey", "Russia", "Nigeria", "Other"]
        required: false
      - label: "Testimonial Quote"
        name: "quote"
        widget: "text"
        hint: "2-3 sentences. Keep it authentic and specific."
      - label: "Customer Photo"
        name: "avatar"
        widget: "image"
        media_folder: "/images/testimonials"
        public_folder: "/images/testimonials"
        choose_url: false
        required: false
