        name: "homepage-about"
        file: "content/pages/homepage-about.md"
        fields:
          - {label: "Brand Showcase Heading", name: "brandShowcaseHeading", widget: "string", required: false, default: "Ningbo Siyang: 25 Years of Excellence"}
          - {label: "Brand Showcase Description", name: "brandShowcaseDescription", widget: "text", required: false, default: "From humble beginnings as a small workshop to becoming a global leader in professional power tools, our journey is built on trust, quality, and innovation. Every tool we craft reflects our commitment to empowering professionals worldwide."}
