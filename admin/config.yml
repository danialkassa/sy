            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "string"}

      - label: "Homepage — Products"
        name: "homepage-products"
        file: "content/pages/homepage-products.md"
        fields:
          - {label: "Featured Products Heading", name: "featuredProductsHeading", widget: "string", required: false, default: "FEATURED TOOLS"}
          - {label: "Featured Products Description", name: "featuredProductsDescription", widget: "text", required: false, default: "Our most popular professional-grade power tools, trusted by contractors worldwide."}
          - {label: "Category Grid Heading", name: "categoryGridHeading", widget: "string", required: false, default: "SHOP BY CATEGORY"}
          - {label: "Category Grid Description", name: "categoryGridDescription", widget: "text", required: false, default: "Find the right tool for every job. Browse our comprehensive selection of professional-grade power tools."}
          - {label: "Video Tutorials Heading", name: "videoTutorialsHeading", widget: "string", required: false, default: "Industry Knowledge"}
          - {label: "Video Tutorials Description", name: "videoTutorialsDesc", widget: "string", required: false, default: "Technical guides, application expertise, and product selection resources"}
