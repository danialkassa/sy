backend:
  name: gitea
  repo: admin/b2b
  branch: main
  api_root: http://165.22.250.66/api/v1
  base_url: http://165.22.250.66
  auth_endpoint: /login/oauth/authorize
  site_domain: 165.22.250.66
  app_id: b44bfe8b-1633-41ee-9533-738e78b392a0

publish_mode: simple

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "content/products"
    create: true
    slug: "{{sku}}"
    fields:
      - label: "Product Name"
        name: "name"
        widget: "string"
      - label: "Product Code (SKU)"
        name: "sku"
        widget: "string"
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Drills & Drivers", "Saws", "Grinders", "Sanders", "Impact Tools", "Combo Kits"]
      - label: "Description"
        name: "description"
        widget: "text"
      - label: "Main Product Photo"
        name: "image"
        widget: "image"
        required: false
      - label: "In Stock?"
        name: "inStock"
        widget: "boolean"
        default: true
      - label: "Featured Product?"
        name: "featured"
        widget: "boolean"
        default: false

  - name: "blog"
    label: "Blog Posts"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Post Title"
        name: "title"
        widget: "string"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
      - label: "Author"
        name: "author"
        widget: "string"
        default: "Ningbo Siyang Team"
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["B2B Insights", "Industry Trends", "Product Spotlight", "Company News", "Technical Guides"]
      - label: "Short Summary"
        name: "excerpt"
        widget: "text"
      - label: "Full Article"
        name: "body"
        widget: "markdown"
