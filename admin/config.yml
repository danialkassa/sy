backend:
  name: gitea
  repo: admin/b2b
  branch: main
  api_root: https://siyang.tools/api/v1
  base_url: https://siyang.tools
  auth_endpoint: /login/oauth/authorize
  site_domain: siyang.tools
  app_id: b44bfe8b-1633-41ee-9533-738e78b392a0
  squash_merges: true
  commit_messages:
    create: "Add {{collection}}: {{slug}}"
    update: "Update {{collection}}: {{slug}}"
    delete: "Remove {{collection}}: {{slug}}"
    uploadMedia: "Upload image: {{path}}"
    deleteMedia: "Remove image: {{path}}"

logo_url: /sy-logo-dark.svg
site_url: https://siyang.tools
display_url: https://siyang.tools
show_preview_links: true
search: true
locale: "en"

slug:
  encoding: "unicode"
  clean_accents: true
  sanitize_replacement: "-"

media_folder: "images/uploads"
public_folder: "/images/uploads"

media_library:
  name: ''
  max_file_size: 5120000
  choose_url: false

collections:
  # ============================================================
  # 0. EDITOR'S GUIDE
  # ============================================================
  - name: "welcome"
    label: "Editor's Guide"
    files:
      - label: "Editor's Guide"
        name: "welcome"
        file: "admin/welcome.md"
        fields:
          - label: "Title"
            name: "title"
            widget: "string"
          - label: "Guide Content"
            name: "body"
            widget: "markdown"

  # ============================================================
  # 1. PRODUCTS
  # ============================================================
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "content/products"
    create: true
    delete: false
    slug: "{{sku}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{sku}} · {{category}}"
    description: "Manage your product catalog."
    identifier_field: "name"
    sortable_fields: ["name", "sku", "category", "brand"]
    view_filters:
      - label: "Active"
        field: "archived"
        pattern: false
      - label: "Archived"
        field: "archived"
        pattern: true
      - label: "In Stock"
        field: "inStock"
        pattern: true
      - label: "Featured"
        field: "featured"
        pattern: true
      - label: "Drills & Drivers"
        field: "category"
        pattern: "drills-drivers"
      - label: "Saws"
        field: "category"
        pattern: "saws"
      - label: "Grinders"
        field: "category"
        pattern: "grinders"
      - label: "Sanders"
        field: "category"
        pattern: "sanders"
      - label: "Impact Tools"
        field: "category"
        pattern: "impact-tools"
      - label: "Combo Kits"
        field: "category"
        pattern: "combo-kits"
    view_groups:
      - label: "By Category"
        field: "category"
      - label: "By Brand"
        field: "brand"
    fields:
      # ── Always visible: core identity ──
      - label: "Name"
        name: "name"
        widget: "string"
        required: true
      - label: "SKU"
        name: "sku"
        widget: "string"
        required: true
      - label: "Category"
        name: "category"
        widget: "select"
        required: true
        options:
          - label: "Drills & Drivers"
            value: "drills-drivers"
          - label: "Saws"
            value: "saws"
          - label: "Grinders"
            value: "grinders"
          - label: "Sanders"
            value: "sanders"
          - label: "Impact Tools"
            value: "impact-tools"
          - label: "Combo Kits"
            value: "combo-kits"
      - label: "Brand"
        name: "brand"
        widget: "select"
        options: ["Ningbo Siyang", "Ningbo Siyang Pro", "Ningbo Siyang Industrial", "Siyang Trade"]
        default: "Ningbo Siyang"
      - label: "Description"
        name: "description"
        widget: "text"
        required: true
      - label: "Photo"
        name: "image"
        widget: "image"
        required: true
        media_folder: "/images/products"
        public_folder: "/images/products"
        choose_url: false
      - label: "Price (USD)"
        name: "price"
        widget: "number"
        value_type: "int"
        default: 0
        required: false
      - label: "Featured?"
        name: "featured"
        widget: "boolean"
        default: false
      - label: "In Stock?"
        name: "inStock"
        widget: "boolean"
        default: true
      - label: "Archived?"
        name: "archived"
        widget: "boolean"
        default: false

      # ── Collapsed: Details ──
      - label: "Details"
        name: "details"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "Tagline"
            name: "tagline"
            widget: "string"
            required: false
          - label: "Benefits"
            name: "userBenefits"
            widget: "list"
            collapsed: true
            fields:
              - {label: "Benefit", name: "benefit", widget: "string"}
            required: false
          - label: "Compare At Price"
            name: "compareAtPrice"
            widget: "number"
            value_type: "int"
            default: 0
            required: false
          - label: "Category Label"
            name: "categoryLabel"
            widget: "string"
            required: false
          - label: "Warranty"
            name: "warranty"
            widget: "string"
            default: "1 year standard, 2 year brushless motor"
          - label: "Compliance"
            name: "compliance"
            widget: "string"
            default: "CE, ROHS, EEC"
          - label: "Rating"
            name: "rating"
            widget: "number"
            value_type: "int"
            min: 1
            max: 5
            default: 4
            required: false
          - label: "Review Count"
            name: "reviewCount"
            widget: "number"
            value_type: "int"
            default: 0
            required: false
          - label: "Top Product?"
            name: "isTopProduct"
            widget: "boolean"
            default: false
            required: false

      # ── Collapsed: Media ──
      - label: "More Media"
        name: "media"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "3D Viewer URL"
            name: "splineSceneUrl"
            widget: "string"
            required: false
          - label: "AR Model URL"
            name: "arModelUrl"
            widget: "string"
            required: false
          - label: "3D Auto-Spin"
            name: "autoSpin"
            widget: "boolean"
            default: true
            required: false
          - label: "Extra Images"
            name: "images"
            widget: "list"
            collapsed: true
            fields:
              - {label: "Image", name: "img", widget: "image", media_folder: "/images/products", public_folder: "/images/products", choose_url: false}
            required: false

      # ── Collapsed: Specs ──
      - label: "Specifications"
        name: "specs"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - {label: "Voltage", name: "voltage", widget: "string", required: false}
          - {label: "Motor Type", name: "motorType", widget: "select", required: false, options: ["", "Brushless", "Brushed", "Universal"]}
          - {label: "Max Torque", name: "maxTorque", widget: "string", required: false}
          - {label: "Speed (Low)", name: "noLoadSpeedLow", widget: "string", required: false}
          - {label: "Speed (High)", name: "noLoadSpeedHigh", widget: "string", required: false}
          - {label: "Speed (RPM)", name: "noLoadSpeed", widget: "string", required: false}
          - {label: "Chuck Size", name: "chuckSize", widget: "string", required: false}
          - {label: "Clutch Settings", name: "clutchSettings", widget: "string", required: false}
          - {label: "Weight (Tool Only)", name: "weightToolOnly", widget: "string", required: false}
          - {label: "Weight (With Battery)", name: "weightWithBattery", widget: "string", required: false}
          - {label: "Overall Length", name: "overallLength", widget: "string", required: false}
          - {label: "Sound Power", name: "soundPower", widget: "string", required: false}
          - {label: "Vibration Level", name: "vibrationLevel", widget: "string", required: false}
          - {label: "Battery Platform", name: "batteryPlatform", widget: "string", required: false}
          - {label: "LED Work Light", name: "ledWorkLight", widget: "string", required: false}
          - {label: "Belt Hook", name: "beltHook", widget: "string", required: false}
          - {label: "Cord Length", name: "cordLength", widget: "string", required: false}
          - {label: "Disc/Blade Diameter", name: "discBladeDiameter", widget: "string", required: false}
          - {label: "Arbor Size", name: "arborSize", widget: "string", required: false}
          - {label: "Max Cutting Depth", name: "maxCuttingDepth", widget: "string", required: false}
          - {label: "Pad Size", name: "padSize", widget: "string", required: false}
          - {label: "Impacts Per Minute", name: "ipm", widget: "string", required: false}
          - {label: "Spindle Thread", name: "spindleThread", widget: "string", required: false}
          - {label: "Switch Type", name: "switchType", widget: "string", required: false}
          - {label: "Auxiliary Handle", name: "auxHandle", widget: "string", required: false}

      # ── Collapsed: Trade ──
      - label: "Trade & Logistics"
        name: "trade"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - label: "Related Products"
            name: "relatedProducts"
            widget: "relation"
            collection: "products"
            value_field: "sku"
            search_fields: ["name", "sku"]
            display_fields: ["name", "sku"]
            multiple: true
            required: false
          - label: "Downloads"
            name: "downloads"
            widget: "object"
            required: false
            collapsed: true
            fields:
              - {label: "Spec Sheet PDF", name: "specSheet", widget: "file", media_folder: "/assets/downloads", public_folder: "/assets/downloads", choose_url: false, required: false}
              - {label: "Manual PDF", name: "manual", widget: "file", media_folder: "/assets/downloads", public_folder: "/assets/downloads", choose_url: false, required: false}
          - label: "MOQ"
            name: "moq"
            widget: "string"
            default: "500 units"
          - label: "Lead Time"
            name: "leadTime"
            widget: "string"
            default: "30-45 days"
          - label: "Stock Qty"
            name: "stock"
            widget: "number"
            value_type: "int"
            default: 0
            required: false
          - label: "Warehouse"
            name: "warehouseLocation"
            widget: "string"
            required: false

      # ── Collapsed: Compare ──
      - label: "Compare Fields"
        name: "compareFields"
        widget: "object"
        required: false
        collapsed: true
        fields:
          - {label: "Power (W)", name: "power", widget: "string", required: false}
          - {label: "Voltage", name: "voltage", widget: "string", required: false}
          - {label: "RPM", name: "noLoadSpeed", widget: "string", required: false}
          - {label: "Disc/Blade Size", name: "discSize", widget: "string", required: false}
          - {label: "Weight", name: "weightToolOnly", widget: "string", required: false}
          - {label: "Price Range", name: "priceRange", widget: "string", required: false}
          - {label: "Certifications", name: "certifications", widget: "string", required: false}
          - {label: "MOQ", name: "moq", widget: "string", required: false}

  # ============================================================
  # 2. BLOG POSTS
  # ============================================================
  - name: "blog"
    label: "Blog"
    label_singular: "Post"
    folder: "content/blog"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{category}} · {{author}}"
    description: "Blog posts."
    sortable_fields: ["title", "date", "category"]
    view_filters:
      - label: "Active"
        field: "archived"
        pattern: false
      - label: "Archived"
        field: "archived"
        pattern: true
      - label: "Featured"
        field: "featured"
        pattern: true
    view_groups:
      - label: "By Category"
        field: "category"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
      - label: "Date"
        name: "date"
        widget: "datetime"
      - label: "Author"
        name: "author"
        widget: "string"
        default: "Ningbo Siyang Team"
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["B2B Insights", "Industry Trends", "Product Spotlight", "Company News", "Technical Guides"]
      - label: "Cover Image"
        name: "image"
        widget: "image"
        media_folder: "/images/blog"
        public_folder: "/images/blog"
        choose_url: false
        required: false
      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
      - label: "Featured?"
        name: "featured"
        widget: "boolean"
        default: false
      - label: "Article"
        name: "body"
        widget: "markdown"
      - label: "Archived?"
        name: "archived"
        widget: "boolean"
        default: false

  # ============================================================
  # 3. TESTIMONIALS
  # ============================================================
  - name: "testimonials"
    label: "Testimonials"
    label_singular: "Testimonial"
    folder: "content/testimonials"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{company}} · {{country}}"
    description: "Customer testimonials."
    sortable_fields: ["name", "company", "order"]
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
      - label: "Company"
        name: "company"
        widget: "string"
      - label: "Country"
        name: "country"
        widget: "select"
        options: ["", "Germany", "UAE", "Brazil", "USA", "UK", "France", "Australia", "Japan", "South Korea", "India", "Saudi Arabia", "South Africa", "Mexico", "Indonesia", "Thailand", "Vietnam", "Turkey", "Russia", "Nigeria", "Other"]
        required: false
      - label: "Quote"
        name: "quote"
        widget: "text"
      - label: "Photo"
        name: "avatar"
        widget: "image"
        media_folder: "/images/testimonials"
        public_folder: "/images/testimonials"
        choose_url: false
        required: false
      - label: "Stars"
        name: "rating"
        widget: "number"
        min: 1
        max: 5
        default: 5
      - label: "Order"
        name: "order"
        widget: "number"
        default: 0
      - label: "Archived?"
        name: "archived"
        widget: "boolean"
        default: false

  # ============================================================
  # 4. TEAM MEMBERS
  # ============================================================
  - name: "team_members"
    label: "Team"
    label_singular: "Member"
    folder: "content/team"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{title}} · {{department}}"
    description: "Team members."
    sortable_fields: ["name", "title", "order"]
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Department"
        name: "department"
        widget: "select"
        options: ["Leadership", "Engineering & R&D", "Sales & Marketing", "Quality Assurance", "Operations", "Finance"]
        required: false
      - label: "Photo"
        name: "photo"
        widget: "image"
        media_folder: "/images/team"
        public_folder: "/images/team"
        choose_url: false
        required: false
      - label: "Bio"
        name: "bio"
        widget: "text"
        required: false
      - label: "Email"
        name: "email"
        widget: "string"
        required: false
        pattern: ['^[^@]+@[^@]+\\.[^@]+$', 'Enter a valid email']
      - label: "LinkedIn"
        name: "linkedin"
        widget: "string"
        required: false
        pattern: ['^https?://.+', 'Enter a valid URL']
      - label: "Order"
        name: "order"
        widget: "number"
        default: 0
      - label: "Archived?"
        name: "archived"
        widget: "boolean"
        default: false

  # ============================================================
  # 5. CERTIFICATIONS
  # ============================================================
  - name: "certifications"
    label: "Certifications"
    label_singular: "Certification"
    folder: "content/certifications"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{issuer}} · {{year}}"
    description: "Company certifications."
    sortable_fields: ["name", "issuer", "year"]
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
      - label: "Issuer"
        name: "issuer"
        widget: "string"
      - label: "Image"
        name: "image"
        widget: "image"
        media_folder: "/images/certificates"
        public_folder: "/images/certificates"
        choose_url: false
        required: false
      - label: "Year"
        name: "year"
        widget: "string"
      - label: "Archived?"
        name: "archived"
        widget: "boolean"
        default: false

  # ============================================================
  # 6. FAQ
  # ============================================================
  - name: "faq"
    label: "FAQ"
    label_singular: "FAQ Item"
    folder: "content/faq"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{category}} · #{{order}}"
    description: "FAQ items."
    sortable_fields: ["question", "category", "order"]
    fields:
      - label: "Question"
        name: "question"
        widget: "string"
      - label: "Answer"
        name: "answer"
        widget: "text"
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Orders", "Payment", "Shipping", "Quality", "Customization", "Warranty", "Support", "Partnership"]
      - label: "Order"
        name: "order"
        widget: "number"
        default: 0
      - label: "Archived?"
        name: "archived"
        widget: "boolean"
        default: false

  # ============================================================
  # 7. PARTNERS
  # ============================================================
  - name: "partners"
    label: "Partners"
    label_singular: "Partner"
    folder: "content/partners"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{partnerType}} · {{country}}"
    description: "Partner logos."
    sortable_fields: ["name", "order"]
    fields:
      - label: "Name"
        name: "name"
        widget: "string"
      - label: "Type"
        name: "partnerType"
        widget: "select"
        options: ["", "Distributor", "OEM Client", "Retail Chain", "Supplier", "Strategic Partner"]
        required: false
      - label: "Logo"
        name: "logo"
        widget: "image"
        media_folder: "/images/partners"
        public_folder: "/images/partners"
        choose_url: false
        required: false
      - label: "Country"
        name: "country"
        widget: "string"
        required: false
      - label: "Website"
        name: "website"
        widget: "string"
        required: false
        pattern: ['^https?://.+', 'Enter a valid URL']
      - label: "Order"
        name: "order"
        widget: "number"
        default: 0
      - label: "Archived?"
        name: "archived"
        widget: "boolean"
        default: false

  # ============================================================
  # 8. DISTRIBUTORS
  # ============================================================
  - name: "distributors"
    label: "Distributors"
    label_singular: "Distributor"
    folder: "content/distributors"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{country}} · {{region}}"
    description: "Global distributors."
    sortable_fields: ["companyName", "country", "region"]
    fields:
      - label: "Company"
        name: "companyName"
        widget: "string"
      - label: "Country"
        name: "country"
        widget: "string"
      - label: "Region"
        name: "region"
        widget: "select"
        options: ["Asia-Pacific", "Europe", "North America", "Middle East", "Africa", "South America"]
      - label: "Contact"
        name: "contactPerson"
        widget: "string"
        required: false
      - label: "Email"
        name: "email"
        widget: "string"
        required: false
        pattern: ['^[^@]+@[^@]+\\.[^@]+$', 'Enter a valid email']
      - label: "Phone"
        name: "phone"
        widget: "string"
        required: false
      - label: "Website"
        name: "website"
        widget: "string"
        required: false
        pattern: ['^https?://.+', 'Enter a valid URL']
      - label: "Logo"
        name: "logo"
        widget: "image"
        media_folder: "/images/distributors"
        public_folder: "/images/distributors"
        choose_url: false
        required: false
      - label: "Address"
        name: "address"
        widget: "text"
        required: false
      - label: "Product Lines"
        name: "productLines"
        widget: "string"
        required: false
      - label: "Archived?"
        name: "archived"
        widget: "boolean"
        default: false

  # ============================================================
  # 9. WARRANTY
  # ============================================================
  - name: "warranty"
    label: "Warranty"
    label_singular: "Policy"
    folder: "content/warranty"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{warrantyType}} · {{warrantyPeriod}}"
    description: "Warranty policies."
    sortable_fields: ["title", "warrantyType"]
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Type"
        name: "warrantyType"
        widget: "select"
        options:
          - label: "Standard"
            value: "standard"
          - label: "Brushless Motor"
            value: "brushless_motor"
          - label: "Extended"
            value: "extended"
      - label: "Period"
        name: "warrantyPeriod"
        widget: "string"
      - label: "Categories"
        name: "applicableCategories"
        widget: "list"
        collapsed: true
        field: {label: "Category", name: "category", widget: "select", options: ["All Products", "Drills & Drivers", "Saws", "Grinders", "Sanders", "Impact Tools", "Combo Kits", "Brushless Motor Products"]}
        required: false
      - label: "Description"
        name: "description"
        widget: "text"
      - label: "Exclusions"
        name: "exclusions"
        widget: "list"
        collapsed: true
        required: false
      - label: "Claim Process"
        name: "claimProcess"
        widget: "text"
        required: false
      - label: "Archived?"
        name: "archived"
        widget: "boolean"
        default: false

  # ============================================================
  # 10. SAFETY NOTICES
  # ============================================================
  - name: "safety"
    label: "Safety"
    label_singular: "Notice"
    folder: "content/safety"
    create: true
    delete: false
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{severity}} · {{noticeType}}"
    description: "Safety notices."
    sortable_fields: ["title", "severity", "date"]
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Type"
        name: "noticeType"
        widget: "select"
        options:
          - label: "Advisory"
            value: "safety advisory"
          - label: "Recall"
            value: "recall"
          - label: "Compliance"
            value: "compliance update"
      - label: "Severity"
        name: "severity"
        widget: "select"
        options:
          - label: "Info"
            value: "info"
          - label: "Warning"
            value: "warning"
          - label: "Critical"
            value: "critical"
        default: "info"
      - label: "Affected SKUs"
        name: "affectedSkus"
        widget: "relation"
        collection: "products"
        value_field: "sku"
        search_fields: ["name", "sku"]
        display_fields: ["name", "sku"]
        multiple: true
        required: false
      - label: "Description"
        name: "description"
        widget: "text"
      - label: "Resolution"
