backend:
  name: gitea
  repo: admin/b2b
  branch: main
  api_root: https://siyang.tools/api/v1
  base_url: https://siyang.tools
  auth_endpoint: /login/oauth/authorize
  site_domain: siyang.tools
  app_id: b44bfe8b-1633-41ee-9533-738e78b392a0
  squash_merges: true
  commit_messages:
    create: "Add {{collection}}: {{slug}}"
    update: "Update {{collection}}: {{slug}}"
    delete: "Remove {{collection}}: {{slug}}"
    uploadMedia: "Upload image: {{path}}"
    deleteMedia: "Remove image: {{path}}"

publish_mode: simple

logo_url: /ningbo-siyang-logo-dark.svg
site_url: https://siyang.tools
display_url: https://siyang.tools
show_preview_links: true
search: true
locale: "en"

slug:
  encoding: "unicode"
  clean_accents: true
  sanitize_replacement: "-"

media_folder: "images/uploads"
public_folder: "/images/uploads"

media_library:
  name: ''
  max_file_size: 5120000
  choose_url: false

collections:
  # ============================================================
  # 1. PRODUCTS — Full product catalog
  # ============================================================
  # DATA SOURCE: content/products/index.json (listing) + content/products/SY-*.json (detail)
  # The website reads from index.json for product cards. CMS writes .md files.
  # A bridge (Phase 2) will regenerate index.json from .md files.
  #
  # CRITICAL: category values use URL-slug format (e.g., "drills-drivers")
  # to match the actual data in index.json and individual product JSONs.
  # categoryLabel uses display format for the website UI.
  # ============================================================
  - name: "products"
    label: "Products"
    label_singular: "Product"
    folder: "content/products"
    create: true
    delete: true
    slug: "{{sku}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{sku}} · {{category}}"
    description: "Manage your complete product catalog. Each product has basic info, specifications, compliance, and trade details."
    identifier_field: "name"
    sortable_fields: ["name", "sku", "category", "brand"]
    view_filters:
      - label: "In Stock"
        field: "inStock"
        pattern: true
      - label: "Out of Stock"
        field: "inStock"
        pattern: false
      - label: "Featured"
        field: "featured"
        pattern: true
      - label: "Drills & Drivers"
        field: "category"
        pattern: "drills-drivers"
      - label: "Saws"
        field: "category"
        pattern: "saws"
      - label: "Grinders"
        field: "category"
        pattern: "grinders"
      - label: "Sanders"
        field: "category"
        pattern: "sanders"
      - label: "Impact Tools"
        field: "category"
        pattern: "impact-tools"
      - label: "Combo Kits"
        field: "category"
        pattern: "combo-kits"
      - label: "Draft (Hidden)"
        field: "draft"
        pattern: true
      - label: "Published"
        field: "draft"
        pattern: false
    view_groups:
      - label: "By Category"
        field: "category"
      - label: "By Brand"
        field: "brand"
      - label: "By Stock Status"
        field: "inStock"
    fields:
      - label: "Draft (Hidden)"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
        hint: "Toggle ON to hide this item from the website without deleting it. The item still exists in the CMS but won't appear on any page."
      # ---- Basic Info ----
      - label: "Product Name"
        name: "name"
        widget: "string"
        hint: "The full product name as displayed to buyers. Be specific: include voltage, key feature, and tool type."
      - label: "Product Code (SKU)"
        name: "sku"
        widget: "string"
        hint: "Unique product identifier. Format: SY-TT-VV-XXX (e.g., SY-DD-20V-BL). This becomes the filename."
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - label: "Drills & Drivers"
            value: "drills-drivers"
          - label: "Saws"
            value: "saws"
          - label: "Grinders"
            value: "grinders"
          - label: "Sanders"
            value: "sanders"
          - label: "Impact Tools"
            value: "impact-tools"
          - label: "Combo Kits"
            value: "combo-kits"
        hint: "Select the product category. This determines the URL slug and the display label shown on product cards."
      - label: "Brand"
        name: "brand"
        widget: "select"
        options: ["Ningbo Siyang", "Ningbo Siyang Pro", "Ningbo Siyang Industrial", "Siyang Trade"]
        default: "Ningbo Siyang"
        hint: "Which brand line does this product belong to?"
      - label: "Description"
        name: "description"
        widget: "text"
        hint: "2-3 sentence product description highlighting key features, applications, and what's included. This appears on product cards and detail pages."
      - label: "Tagline"
        name: "tagline"
        widget: "string"
        required: false
        hint: "A short punchy one-liner shown on product cards instead of the full description. If empty, the description is used."
      - label: "User Benefits"
        name: "userBenefits"
        widget: "list"
        field: { label: "Benefit", name: "benefit", widget: "string" }
        required: false
        hint: "Add 3-5 compelling bullet points. Each line becomes one benefit shown on product cards."
      # ---- Images ----
      - label: "Main Product Photo"
        name: "image"
        widget: "image"
        media_folder: "/images/products"
        public_folder: "/images/products"
        choose_url: false
        hint: "The primary product image. Use a clean, well-lit photo on a white or neutral background. Recommended: 800x800px minimum."
      - label: "Additional Images"
        name: "images"
        widget: "list"
        field: {label: "Image", name: "img", widget: "image", media_folder: "/images/products", public_folder: "/images/products", choose_url: false}
        hint: "Additional product photos from different angles or in use. Add 2-4 images for best results."
        required: false
      # ---- Specifications ----
      - label: "Specifications"
        name: "specs"
        widget: "object"
        hint: "Detailed technical specifications. Only fill in the specs relevant to this product type — leave others blank."
        required: false
        fields:
          - label: "Voltage"
            name: "voltage"
            widget: "string"
            required: false
            hint: "e.g., 20V MAX, 220V-240V, 110V"
          - label: "Motor Type"
            name: "motorType"
            widget: "select"
            required: false
            options: ["", "Brushless", "Brushed", "Universal"]
            hint: "Type of motor. Brushless is more efficient and durable."
          - label: "Max Torque"
            name: "maxTorque"
            widget: "string"
            required: false
            hint: "e.g., 530 in-lbs (60 Nm)"
          - label: "No-Load Speed (Low)"
            name: "noLoadSpeedLow"
            widget: "string"
            required: false
            hint: "e.g., 0-450 RPM"
          - label: "No-Load Speed (High)"
            name: "noLoadSpeedHigh"
            widget: "string"
            required: false
            hint: "e.g., 0-1500 RPM"
          - label: "No-Load Speed (RPM)"
            name: "noLoadSpeed"
            widget: "string"
            required: false
            hint: "For grinders/sanders with single speed. e.g., 11,000 RPM"
          - label: "Chuck Size"
            name: "chuckSize"
            widget: "string"
            required: false
            hint: "e.g., 1/2\" (13mm) keyless metal chuck"
          - label: "Clutch Settings"
            name: "clutchSettings"
            widget: "string"
            required: false
            hint: "For drills/drivers. e.g., 16+1, 20+1"
          - label: "Weight (Tool Only)"
            name: "weightToolOnly"
            widget: "string"
            required: false
            hint: "e.g., 3.5 lbs (1.6 kg)"
          - label: "Weight (With Battery)"
            name: "weightWithBattery"
            widget: "string"
            required: false
            hint: "e.g., 4.2 lbs (1.9 kg)"
          - label: "Overall Length"
            name: "overallLength"
            widget: "string"
            required: false
            hint: "e.g., 7-5/8\" (194mm)"
          - label: "Sound Power Level"
            name: "soundPower"
            widget: "string"
            required: false
            hint: "e.g., 95 dB(A)"
          - label: "Vibration Level"
            name: "vibrationLevel"
            widget: "string"
            required: false
            hint: "e.g., 2.5 m/s²"
          - label: "Battery Platform"
            name: "batteryPlatform"
            widget: "string"
            required: false
            hint: "e.g., Siyang 20V MAX"
          - label: "LED Work Light"
            name: "ledWorkLight"
            widget: "string"
            required: false
            hint: "e.g., Yes, with 20-second delay"
          - label: "Belt Hook"
            name: "beltHook"
            widget: "string"
            required: false
            hint: "e.g., Yes, adjustable"
          - label: "Cord Length"
            name: "cordLength"
            widget: "string"
            required: false
            hint: "For corded tools. e.g., 6.5 ft (2m)"
          - label: "Disc/Blade Diameter"
            name: "discBladeDiameter"
            widget: "string"
            required: false
            hint: "For saws/grinders. e.g., 7-1/4\""
          - label: "Arbor Size"
            name: "arborSize"
            widget: "string"
            required: false
            hint: "For saws/grinders. e.g., 5/8\""
          - label: "Max Cutting Depth at 90°"
            name: "maxCuttingDepth"
            widget: "string"
            required: false
            hint: "For saws. e.g., 2-1/2\" at 90°"
          - label: "Pad Size"
            name: "padSize"
            widget: "string"
            required: false
            hint: "For sanders. e.g., 5\" random orbit"
          - label: "Impacts Per Minute"
            name: "ipm"
            widget: "string"
            required: false
            hint: "For impact tools. e.g., 0-3400 IPM"
          - label: "Spindle Thread"
            name: "spindleThread"
            widget: "string"
            required: false
            hint: "For grinders. e.g., M14 x 2.0"
          - label: "Switch Type"
            name: "switchType"
            widget: "string"
            required: false
            hint: "e.g., Variable speed trigger, Paddle switch, Slide switch"
          - label: "Auxiliary Handle"
            name: "auxHandle"
            widget: "string"
            required: false
            hint: "e.g., Yes, 2-position"
      # ---- Compliance ----
      - label: "Compliance"
        name: "compliance"
        widget: "string"
        hint: "List all certifications separated by commas. Example: CE, ROHS, GS, EEC. Must match the format used in index.json."
        default: "CE, ROHS, EEC"
      # ---- Trade Details ----
      - label: "Related Products"
        name: "relatedProducts"
        widget: "relation"
        collection: "products"
        value_field: "sku"
        search_fields: ["name", "sku"]
        display_fields: ["name", "sku"]
        multiple: true
        required: false
        hint: "Select 2-3 related products for cross-selling on the product detail page."
      - label: "Downloads"
        name: "downloads"
        widget: "object"
        required: false
        hint: "Upload product documentation files."
        fields:
          - label: "Spec Sheet PDF"
            name: "specSheet"
            widget: "file"
            media_folder: "/assets/downloads"
            public_folder: "/assets/downloads"
            choose_url: false
            required: false
            hint: "Upload the product spec sheet PDF."
          - label: "Manual PDF"
            name: "manual"
            widget: "file"
            media_folder: "/assets/downloads"
            public_folder: "/assets/downloads"
            choose_url: false
            required: false
            hint: "Upload the product manual PDF."
      - label: "Minimum Order Quantity"
        name: "moq"
        widget: "string"
        default: "500 units"
        hint: "The minimum number of units a buyer must order. Adjust for different product types."
      - label: "Lead Time"
        name: "leadTime"
        widget: "string"
        default: "30-45 days"
        hint: "Production lead time after order confirmation and deposit payment."
      - label: "In Stock?"
        name: "inStock"
        widget: "boolean"
        default: true
        hint: "Toggle ON if this product is currently available for ordering."
      - label: "Featured Product?"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Toggle ON to show this product as a featured item on the homepage hero section."
      - label: "Warranty"
        name: "warranty"
        widget: "string"
        default: "1 year standard, 2 year brushless motor"
        hint: "Warranty coverage description. Be specific about what's covered and for how long."
      - label: "Warehouse Location"
        name: "warehouseLocation"
        widget: "string"
        required: false
        hint: "Internal use only. Which warehouse stores this product. Not displayed on the website."

  # ============================================================
  # 2. BLOG POSTS
  # ============================================================
  # DATA SOURCE: content/blog/index.json (listing) + content/blog/{slug}.md (detail)
  # The cms-loader reads index.json for blog listing and .md files for full posts.
  # ============================================================
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "content/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{category}} · {{author}}"
    description: "Write and manage blog posts for SEO, industry authority, and customer engagement."
    sortable_fields: ["title", "date", "category"]
    view_filters:
      - label: "B2B Insights"
        field: "category"
        pattern: "B2B Insights"
      - label: "Industry Trends"
        field: "category"
        pattern: "Industry Trends"
      - label: "Product Spotlight"
        field: "category"
        pattern: "Product Spotlight"
      - label: "Company News"
        field: "category"
        pattern: "Company News"
      - label: "Technical Guides"
        field: "category"
        pattern: "Technical Guides"
      - label: "Featured Posts"
        field: "featured"
        pattern: true
      - label: "Draft (Hidden)"
        field: "draft"
        pattern: true
      - label: "Published"
        field: "draft"
        pattern: false
    view_groups:
      - label: "By Category"
        field: "category"
      - label: "By Author"
        field: "author"
    fields:
      - label: "Draft (Hidden)"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
        hint: "Toggle ON to hide this item from the website without deleting it. The item still exists in the CMS but won't appear on any page."
      - label: "Post Title"
        name: "title"
        widget: "string"
        hint: "Write a clear, compelling headline. Include keywords for SEO."
      - label: "URL Slug"
        name: "slug"
        widget: "string"
        hint: "URL-friendly version of the title. Lowercase with hyphens. Example: choosing-the-right-power-drill"
      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        hint: "When this post should appear as published. Set a future date to schedule."
      - label: "Author Name"
        name: "author"
        widget: "string"
        hint: "Who wrote this post?"
        default: "Ningbo Siyang Team"
      - label: "Author Role"
        name: "authorRole"
        widget: "string"
        hint: "The author's job title or role. Shown under their name on the post."
        default: "Content Team"
        required: false
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["B2B Insights", "Industry Trends", "Product Spotlight", "Company News", "Technical Guides"]
        hint: "Pick the topic area. This determines which blog section the post appears in."
      - label: "Tags"
        name: "tags"
        widget: "list"
        hint: "3-5 relevant tags for SEO and filtering. Use lowercase. Example: procurement, B2B, sourcing"
        required: false
      - label: "Cover Image"
        name: "image"
        widget: "image"
        media_folder: "/images/blog"
        public_folder: "/images/blog"
        choose_url: false
        required: false
        hint: "The main image shown at the top of the post and in the blog listing. Recommended: 1200x630px."
      - label: "Short Summary"
        name: "excerpt"
        widget: "text"
        hint: "A 1-2 sentence preview shown in the blog listing. Make it compelling to encourage clicks."
      - label: "Reading Time (minutes)"
        name: "readTime"
        widget: "number"
        default: 5
        min: 1
        max: 60
        hint: "Estimated reading time. Most posts are 3-8 minutes."
      - label: "Featured Post?"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Toggle ON to show this post as a featured article on the homepage."
      - label: "Full Article"
        name: "body"
        widget: "markdown"
        hint: "Write your full blog post here. Use headings (##), bold, lists, and images for readability."

  # ============================================================
  # 3. TESTIMONIALS
  # ============================================================
  # DATA SOURCE: content/testimonials/index.json
  # ============================================================
  - name: "testimonials"
    label: "Testimonials"
    label_singular: "Testimonial"
    folder: "content/testimonials"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{company}} · {{country}}"
    description: "Customer testimonials and reviews. These appear on the company page and homepage."
    sortable_fields: ["name", "company", "order"]
    view_filters:
      - label: "Draft (Hidden)"
        field: "draft"
        pattern: true
      - label: "Published"
        field: "draft"
        pattern: false
    fields:
      - label: "Draft (Hidden)"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
        hint: "Toggle ON to hide this item from the website without deleting it. The item still exists in the CMS but won't appear on any page."
      - label: "Customer Name"
        name: "name"
        widget: "string"
        hint: "Full name of the person giving the testimonial."
      - label: "Job Title"
        name: "position"
        widget: "string"
        required: false
        hint: "Their role at the company. Example: Procurement Manager"
      - label: "Company Name"
        name: "company"
        widget: "string"
        hint: "The company this customer represents."
      - label: "Country"
        name: "country"
        widget: "select"
        options: ["", "Germany", "UAE", "Brazil", "USA", "UK", "France", "Australia", "Japan", "South Korea", "India", "Saudi Arabia", "South Africa", "Mexico", "Indonesia", "Thailand", "Vietnam", "Turkey", "Russia", "Nigeria", "Other"]
        required: false
        hint: "The customer's country. Used for regional filtering."
      - label: "Testimonial Quote"
        name: "quote"
        widget: "text"
        hint: "The testimonial text. Keep it authentic, specific, and 2-3 sentences. Avoid generic praise."
      - label: "Customer Photo"
        name: "avatar"
        widget: "image"
        media_folder: "/images/testimonials"
        public_folder: "/images/testimonials"
        choose_url: false
        required: false
        hint: "Optional headshot. Recommended: 200x200px square."
      - label: "Star Rating"
        name: "rating"
        widget: "number"
        min: 1
        max: 5
        default: 5
        hint: "Rating from 1 to 5 stars. Most testimonials should be 4-5."
      - label: "Display Order"
        name: "order"
        widget: "number"
        default: 0
        hint: "Lower numbers appear first. Use 10, 20, 30... to leave room for reordering."

  # ============================================================
  # 4. TEAM MEMBERS
  # ============================================================
  # DATA SOURCE: content/team/index.json
  # ============================================================
  - name: "team_members"
    label: "Team Members"
    label_singular: "Team Member"
    folder: "content/team"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{title}} · {{department}}"
    description: "Manage the team members displayed on the About > Team page."
    sortable_fields: ["name", "title", "order"]
    view_filters:
      - label: "Draft (Hidden)"
        field: "draft"
        pattern: true
      - label: "Published"
        field: "draft"
        pattern: false
    fields:
      - label: "Draft (Hidden)"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
        hint: "Toggle ON to hide this item from the website without deleting it. The item still exists in the CMS but won't appear on any page."
      - label: "Full Name"
        name: "name"
        widget: "string"
        hint: "The team member's full name."
      - label: "Job Title"
        name: "title"
        widget: "string"
        hint: "Their role or title. Example: CEO & Founder, Sales Director"
      - label: "Department"
        name: "department"
        widget: "select"
        options: ["Leadership", "Engineering & R&D", "Sales & Marketing", "Quality Assurance", "Operations", "Finance"]
        required: false
        hint: "Which department do they belong to?"
      - label: "Photo"
        name: "photo"
        widget: "image"
        media_folder: "/images/team"
        public_folder: "/images/team"
        choose_url: false
        required: false
        hint: "Professional headshot. Recommended: 400x400px square."
      - label: "Short Bio"
        name: "bio"
        widget: "text"
        required: false
        hint: "A brief 1-2 sentence bio highlighting experience and expertise."
      - label: "Email"
        name: "email"
        widget: "string"
        required: false
        pattern: ['^[^@]+@[^@]+\\.[^@]+$', 'Please enter a valid email address']
        hint: "Work email address. Optional — only shown on the team page."
      - label: "LinkedIn Profile"
        name: "linkedin"
        widget: "string"
        required: false
        pattern: ['^https?://.+', 'Please enter a valid URL starting with http:// or https://']
        hint: "LinkedIn profile URL."
      - label: "Display Order"
        name: "order"
        widget: "number"
        default: 0
        hint: "Lower numbers appear first. Use 10, 20, 30... to leave room for reordering."

  # ============================================================
  # 5. CERTIFICATIONS
  # ============================================================
  # DATA SOURCE: content/certifications/index.json
  # ============================================================
  - name: "certifications"
    label: "Certifications"
    label_singular: "Certification"
    folder: "content/certifications"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{issuer}} · {{year}}"
    description: "Manage company certifications and quality marks. These appear on the Certifications page and build buyer trust."
    sortable_fields: ["name", "issuer", "year"]
    view_filters:
      - label: "Draft (Hidden)"
        field: "draft"
        pattern: true
      - label: "Published"
        field: "draft"
        pattern: false
    fields:
      - label: "Draft (Hidden)"
        name: "draft"
        widget: "boolean"
        default: false
        required: false
        hint: "Toggle ON to hide this item from the website without deleting it. The item still exists in the CMS but won't appear on any page."
      - label: "Certification Name"
        name: "name"
        widget: "string"
        hint: "The official name. Example: ISO 9001:2015, CE Marking, RoHS Compliance"
      - label: "Issuing Body"
        name: "issuer"
        widget: "string"
        hint: "The organization that issued this. Example: SGS, TUV Rheinland, Intertek"
      - label: "Certificate Number"
        name: "cert_number"
        widget: "string"
        required: false
        hint: "The official certificate number. Shown on the website for verification."
      - label: "Certificate Image"
        name: "image"
        widget: "image"
        media_folder: "/images/certificates"
        public_folder: "/images/certificates"
        choose_url: false
        required: false
        hint: "Upload a scan or photo of the certificate. Recommended: 800px wide minimum."
      - label: "Scope"
        name: "scope"
        widget: "text"
        required: false
        hint: "What does this certification cover? Example: Design and manufacture of electric power tools"
      - label: "Year Obtained"
        name: "year"
        widget: "string"
        hint: "The year obtained or last renewed."
      - label: "Expiry Date"
        name: "expiryDate"
        widget: "string"
        required: false
        hint: "When does this certification expire? Leave blank if it doesn't expire. Example: 2027-12-31"
      - label: "Verification URL"
        name: "verifyUrl"
        widget: "string"
        required: false
        pattern: ['^https?://.+', 'Please enter a valid URL starting with http:// or https://']
        hint: "A URL where buyers can verify this certification online."

  # ============================================================
  # 6. FAQ
  # ============================================================
  # DATA SOURCE: content/faq/index.json
  # CRITICAL: category values must match index.json exactly:
  #   Orders, Payment, Shipping, Quality, Customization, Warranty, Support, Partnership
  # ============================================================
  - name: "faq"
    label: "FAQ"
    label_singular: "FAQ Item"
    folder: "content/faq"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{category}} · #{{order}}"
    description: "Manage frequently asked questions. These appear on the FAQ page grouped by category."
