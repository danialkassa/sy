  # ============================================================
  # 15. SITE SETTINGS — Company Info, Navigation, Footer
  # ============================================================
  - name: "settings"
    label: "Site Settings"
    delete: false
    description: "Global site settings: company info, navigation, and footer."
    files:
      - label: "Company Information"
        name: "company"
        file: "content/settings/company.md"
        fields:
          - label: "Logo (Dark Background)"
            name: "logoDark"
            widget: "image"
            media_folder: "/images"
            public_folder: "/images"
            choose_url: false
            required: false
            hint: "SVG or PNG with transparent background."
          - label: "Logo (Light Background)"
            name: "logoLight"
            widget: "image"
            media_folder: "/images"
            public_folder: "/images"
            choose_url: false
            required: false
          - label: "Logo Alt Text"
            name: "logoAlt"
            widget: "string"
            default: "SY - Siyang Power Tools"
            required: false
          - label: "Company Full Name"
            name: "companyName"
            widget: "string"
            default: "Ningbo Siyang Power Tools Co., Ltd."
          - label: "Contact Email"
            name: "email"
            widget: "string"
            default: "support@ningbosiyang.com"
            pattern: ['^[^@]+@[^@]+\\.[^@]+$', 'Enter a valid email']
          - label: "Phone Number"
            name: "phone"
            widget: "string"
            default: "+86 574 8888 8888"
            hint: "With country code."
          - label: "Address"
            name: "address"
            widget: "string"
            default: "Ningbo Industrial Zone, Zhejiang, China 315000"
          - label: "Business Hours"
            name: "businessHours"
            widget: "string"
            default: "Mon-Fri 08:00-17:00"
          - label: "Latitude"
            name: "latitude"
            widget: "string"
            default: "29.8683"
            required: false
            hint: "GPS latitude for Google Maps."
          - label: "Longitude"
            name: "longitude"
            widget: "string"
            default: "121.544"
            required: false
            hint: "GPS longitude for Google Maps."
          - label: "Year Founded"
            name: "founded"
            widget: "string"
            default: "1998"
          - label: "WeChat QR Code Image"
            name: "wechatQR"
            widget: "image"
            media_folder: "/images"
            public_folder: "/images"
            choose_url: false
            required: false
          - label: "WhatsApp Number"
            name: "whatsapp"
            widget: "string"
            required: false
            hint: "With country code, no spaces. e.g., 8613800138000"
          - label: "LinkedIn Page"
            name: "linkedin"
            widget: "string"
            required: false
            pattern: ['^https?://.+', 'Enter a valid URL']
          - label: "YouTube Channel"
            name: "youtube"
            widget: "string"
            required: false
            pattern: ['^https?://.+', 'Enter a valid URL']
          - label: "Show Team Section?"
            name: "showTeam"
            widget: "boolean"
            default: true
          - label: "Show Certifications Section?"
            name: "showCertifications"
            widget: "boolean"
            default: true
          - label: "Show Timeline Section?"
            name: "showTimeline"
            widget: "boolean"
            default: true
          - label: "Scroll Animations"
            name: "scrollAnimations"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Gallery Inset", name: "galleryInset", widget: "string", default: "30,15,0|30,15,0|9999,128,16"}
              - {label: "Gallery Parallax Y", name: "galleryParallaxY", widget: "string", default: "0,-192,-384"}
              - {label: "Gallery Inset X", name: "galleryInsetX", widget: "string", default: "48,24,0"}
              - {label: "Gallery Scale", name: "galleryScale", widget: "string", default: "1.15,1.05,1"}
              - {label: "Factory Inset", name: "factoryInset", widget: "string", default: "40,20,0|40,20,0|9999,256,16"}
              - {label: "Quality Inset", name: "qualityInset", widget: "string", default: "30,15,0|30,15,0|9999,200,16"}
              - {label: "CTA Inset", name: "ctaInset", widget: "string", default: "35,18,0|25,12,0|32,20,16"}
              - {label: "CTA Heading Y", name: "ctaHeadingY", widget: "string", default: "60,30,0"}
              - {label: "CTA Button Y", name: "ctaButtonY", widget: "string", default: "40,20,0"}

      - label: "Navigation Menu"
        name: "navigation"
        file: "content/settings/navigation.md"
        fields:
          - label: "Product Categories"
            name: "categories"
            widget: "list"
            hint: "Categories shown in the navigation dropdown."
            fields:
              - label: "Category Name"
                name: "name"
                widget: "string"
              - label: "URL Slug"
                name: "slug"
                widget: "string"
                hint: "Lowercase with hyphens. e.g., drills-drivers"
              - label: "Description"
                name: "description"
                widget: "string"
          - label: "Main Navigation Links"
            name: "mainLinks"
            widget: "list"
            hint: "Main navigation links in the header."
            fields:
              - label: "Link Label"
                name: "label"
                widget: "string"
              - label: "Link URL"
                name: "href"
                widget: "string"
                hint: "Relative path like /products or /contact"

      - label: "Footer"
        name: "footer"
        file: "content/settings/footer.md"
        fields:
          - label: "Copyright Text"
            name: "copyright"
            widget: "string"
            default: "\u00a9 2026 Ningbo Siyang Power Tools Co., Ltd."
          - label: "Trust Badges"
            name: "trustBadges"
            widget: "list"
            hint: "Trust badges shown in the footer."
            field: {label: "Badge Text", name: "text", widget: "string"}
          - label: "Footer Link Columns"
            name: "columns"
            widget: "list"
            hint: "Columns of links in the footer."
            fields:
              - label: "Column Title"
                name: "title"
                widget: "string"
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - label: "Link Label"
                    name: "label"
                    widget: "string"
                  - label: "Link URL"
                    name: "href"
                    widget: "string"
          - label: "Social Media Links"
            name: "socialLinks"
            widget: "list"
            required: false
            fields:
              - label: "Platform"
                name: "platform"
                widget: "select"
                options: ["LinkedIn", "YouTube", "Facebook", "Twitter", "Instagram", "WeChat"]
              - label: "Profile URL"
                name: "href"
                widget: "string"
                pattern: ['^https?://.+', 'Enter a valid URL']
